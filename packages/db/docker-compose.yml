name: dispatchly

services:
  mongodb:
    image: mongo
    container_name: dispatchly-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: dispatchly
    ports:
      - "27017:27017"
    volumes:
      - dispatchly_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

redis:
    image: redis:7-alpine
    container_name: dispatchly-redis
    ports:
      - "6379:6379"
    volumes:
      - dispatchly_redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  dispatchly_mongodb_data:
  dispatchly_redis_data:
