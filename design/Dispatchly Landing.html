<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dispatchly — Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: #f2f0ec;
    color: #0a0a0a;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Landing theme (applies inside each variation wrapper) */
  .dx-landing {
    --bg: #FAFAF7;
    --bg-alt: #F4F2ED;
    --surface: #FFFFFF;
    --fg: #0E0E0C;
    --fg-dim: #76726A;
    --hairline: rgba(14, 14, 12, 0.09);

    --accent: #0A0A0A;
    --accent-tint: rgba(10, 10, 10, 0.05);

    --ok: #10966B;
    --warn: #B87A00;
    --err: #C8402B;

    --code-bg: #0E100D;
    --code-bar: #16191 5;
    --code-bar: #16181 4;
    --code-fg: #E8E6DF;
    --code-dim: rgba(232, 230, 223, 0.45);
    --code-kw: #D66F63;
    --code-str: #A8C077;
    --code-num: #C9A86A;
    --code-comment: #6B6A5F;
    --code-key: #7FA8C9;

    --font-sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
    --font-serif: 'Instrument Serif', Georgia, serif;
  }
  .dx-landing[data-dark="1"] {
    --bg: #0C0D0A;
    --bg-alt: #111310;
    --surface: #16181 4;
    --surface: #15171 3;
    --fg: #EFEDE6;
    --fg-dim: #8A877D;
    --hairline: rgba(239, 237, 230, 0.1);
    --accent-tint: rgba(239, 237, 230, 0.08);
  }
  .dx-landing[data-density="compact"] { font-size: 13.5px; }
  .dx-landing[data-density="comfy"]   { font-size: 16px; }

  @keyframes dpl-ping {
    0% { transform: scale(0.8); opacity: 0.6; }
    80%, 100% { transform: scale(2.4); opacity: 0; }
  }
  @keyframes dpl-fadein {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  button { font-family: inherit; }
  a { color: inherit; }
  ::selection { background: #0E0E0C; color: #FAFAF7; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared-bits.jsx"></script>
<script type="text/babel" src="v1-grid-atlas.jsx"></script>
<script type="text/babel" src="v2-journey-canvas.jsx"></script>
<script type="text/babel" src="v3-console.jsx"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "accent": "#1F4ED8",
  "density": "regular",
  "displayFont": "JetBrains Mono",
  "heroLayout": "default"
}/*EDITMODE-END*/;

const ACCENT_PRESETS = [
  { label: 'Ink',    value: '#0A0A0A' },
  { label: 'Cobalt', value: '#1F4ED8' },
  { label: 'Ember',  value: '#C8402B' },
  { label: 'Moss',   value: '#10784F' },
  { label: 'Violet', value: '#5B43B8' },
];

const FONT_OPTIONS = [
  { label: 'Geist',   value: 'Geist' },
  { label: 'Serif',   value: 'Instrument Serif' },
  { label: 'Mono',    value: 'JetBrains Mono' },
];

function LandingWrap({ tweaks, children }) {
  // Tint the accent color for subtle backgrounds
  const accentTint = tweaks.accent === '#0A0A0A'
    ? 'rgba(10, 10, 10, 0.06)'
    : tweaks.accent + '18'; // hex alpha
  return (
    <div
      className="dx-landing"
      data-dark={tweaks.dark ? '1' : '0'}
      data-density={tweaks.density}
      style={{
        '--accent': tweaks.accent,
        '--accent-tint': accentTint,
        '--font-sans': `'${tweaks.displayFont}', 'Geist', ui-sans-serif, sans-serif`,
      }}
    >
      {children}
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas minScale={0.08} maxScale={2}>
        <DCSection id="landings" title="Dispatchly · Landing Pages" subtitle="Three directions — each is a full landing page. Open any in focus mode to explore.">
          <DCArtboard id="v1" label="A · Grid Atlas" width={1400} height={4400}>
            <LandingWrap tweaks={tweaks}><V1GridAtlas /></LandingWrap>
          </DCArtboard>
          <DCArtboard id="v2" label="B · Journey Canvas" width={1400} height={4000}>
            <LandingWrap tweaks={tweaks}><V2JourneyCanvas /></LandingWrap>
          </DCArtboard>
          <DCArtboard id="v3" label="C · Console" width={1400} height={4200}>
            <LandingWrap tweaks={tweaks}><V3Console /></LandingWrap>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode" value={tweaks.dark} onChange={(v) => setTweak('dark', v)} />
        <TweakRow label="Accent">
          <div style={{ display: 'flex', gap: 5 }}>
            {ACCENT_PRESETS.map((p) => (
              <button
                key={p.value}
                title={p.label}
                onClick={() => setTweak('accent', p.value)}
                style={{
                  width: 26, height: 22, border: tweaks.accent === p.value ? '1.5px solid #000' : '1px solid rgba(0,0,0,0.12)',
                  borderRadius: 5, background: p.value, cursor: 'pointer', padding: 0,
                }}
              />
            ))}
          </div>
        </TweakRow>
        <TweakColor label="Custom" value={tweaks.accent} onChange={(v) => setTweak('accent', v)} />

        <TweakSection label="Typography" />
        <TweakRadio
          label="Display font"
          value={tweaks.displayFont}
          options={FONT_OPTIONS}
          onChange={(v) => setTweak('displayFont', v)}
        />

        <TweakSection label="Density" />
        <TweakRadio
          label="Scale"
          value={tweaks.density}
          options={[
            { value: 'compact', label: 'Compact' },
            { value: 'regular', label: 'Regular' },
            { value: 'comfy',   label: 'Comfy' },
          ]}
          onChange={(v) => setTweak('density', v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
